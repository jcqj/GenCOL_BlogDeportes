    <main>
        <h2>Contactanos!!</h2>
        <p>Completa el siguiente formulario para poder contactarnos contigo</p>
        
        <from id = "formulario">
            <div>
                <label>Nombre completo:</label>
                <input type="text" id="nombre"  placeholder="Tu nombre: " required>
            </div>

            <div>
                <label>Correo electronico:</label>
                <input type = "text" id="correo" placeholder="Tu correo:" required>
            </div>

            <div>
                <label>Numero:</label>
                <input type = "number" id="numero" placeholder="Tu numero:" required>
            </div>

            <div>
                <label>Asunto:</label>
                <input type = "text" id="asunto" placeholder="Asunto:" required>
            </div>
        </from>
        <br>
        <button>Enviar</button>
    </main>
</body>
